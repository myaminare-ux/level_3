<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>폼태그2. 선택, 목록 기능</title>
    <!-- 웹글꼴 -->
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/form02.css">
    <!-- js -->
    <script src="./scripts/form02.js" defer></script>
</head>
<body>
    <form action="#" method="post" id="frm1" name="frm1">
        <!-- p>input:search#user_search_txt -->
        <p><input type="search" name="user_search_txt" id="user_search_txt" placeholder="검색어"></p>
        <p><input type="text" value="1" id="number"></p>
        <p><input type="password" name="user_pw" id="user_pw" placeholder="비밀번호를 입력하세요"></p>
        <p><textarea name="user_review" id="user_review" rows="20" cols="50"></textarea></p>
        <p><textarea name="" id="close_comment" cols="40" disabled>현재는 문의 시간이 아닙니다.</textarea></p>
        <p><textarea name="user_review" id="user_review" placeholder="10자 이상 100자 이하로 입력해주세요." cols="50" rows="5" minlength="10" maxlength="100"></textarea></p>
        <p><button type="button" id="review_btn">리뷰 등록</button></p>
        <hr>
        <div class="group1">
            <span>성별을 선택해주세요.</span>
            <label for="male">남자</label>
            <input type="radio" name="gender" value="male" id="male">
            <label for="flabelale">여자</label>
            <input type="radio" name="gender" value="flabelale" id="flabelale">
            <label for="gender_none">공개안함</label>
            <input type="radio" name="gender" value="gender_none" id="gender_none">
            <!-- input 입력 양식/선택 양식 -->
            <!-- 입력 양식 name(데이터 구분 목적), value(기본값) 속성 -->
            <!-- 선택 양식 name(2개 이상의 선택을 묶어주는 동일 그룹명), value(데이터 구분 목적) -->
            <span>광고 수신 동의</span>
            <label for="agree">동의함</label>
            <input type="radio" name="ad_consent" id="agree" value="agree">
            <label for="no_agree">동의안함</label>
            <input type="radio" name="ad_consent" id="no_agree" value="no_agree">
            <label for="login_state_y">로그인 상태 유지</label>
            <input type="checkbox" name="login_state_y_g" id="login_state_y" value="login_state_y">
            <span>관심 종목을 2개 이상 선택하세요.</span>
            <label for="skill_it">기술/IT</label><input type="checkbox" name="event" id="skill_it" value="skill_it">
            <label for="sports">스포츠</label><input type="checkbox" name="event" id="sports" value="sports">
            <label for="music_movie">음악/영화</label><input type="checkbox" name="event" id="music_movie" value="music_movie">
            <span>주문 색상</span>
            <select name="color_select" id="color_select">
                <!-- option 내부 다른 태그 금지 -->
                <option value="none">색상을 선택하세요.</option>
                <option value="white">흰색</option>
                <option value="gray">회색</option>
                <option value="black">검정색</option>
            </select>
            <span>주문 크기</span>
            <select name="size_g" id="size_g">
                <option value="none">크기를 선택하세요.</option>
                <option value="large">L</option>
                <option value="medium">M</option>
                <option value="small">S</option>
            </select>
        </div>
    </form>
</body>
</html>
